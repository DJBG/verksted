<!DOCTYPE html>
<html lang="no" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verksted – Intern arbeidsordre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function initTheme() {
      const storedTheme = localStorage.getItem('theme');
      const root = document.documentElement;
      if (storedTheme === 'light') {
        root.classList.remove('dark');
      } else {
        root.classList.add('dark');
      }
    }
    function toggleTheme() {
      const root = document.documentElement;
      const isDark = root.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    document.addEventListener('DOMContentLoaded', initTheme);
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: '#0ea5e9' } } }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
    * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
    .mono { font-family: 'DM Mono', monospace; }
    .dot-pending  { background:#f59e0b; box-shadow:0 0 6px #f59e0b88; }
    .dot-approved { background:#22c55e; box-shadow:0 0 6px #22c55e88; }
    .dot-rejected { background:#ef4444; box-shadow:0 0 6px #ef444488; }
    .dot-done     { background:#64748b; }
    .dot-new      { background:#0ea5e9; box-shadow:0 0 6px #0ea5e988; }
    .status-dot   { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .toast {
      position:fixed; bottom:24px; right:24px; z-index:100;
      padding:10px 18px; border-radius:10px; font-size:13px; font-weight:600;
      transform:translateY(60px); opacity:0; transition:all 0.3s;
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast-success { background:#22c55e; color:white; }
    .toast-warn    { background:#f59e0b; color:white; }
    .toast-default { background:#0ea5e9; color:white; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#94a3b833; border-radius:4px; }
  </style>
</head>

<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

  <!-- THEME BUTTON -->
  <button onclick="toggleTheme()" class="fixed z-50 top-4 right-4 flex items-center gap-2
    rounded-full bg-slate-900 text-slate-100
    dark:bg-slate-100 dark:text-slate-900
    px-4 py-2 text-xs font-semibold
    shadow-lg hover:scale-105 transition-transform">
    <span class="hidden sm:inline">Lys / Mørk modus</span>
    <span class="sm:hidden">🌗</span>
  </button>

  <!-- TOPBAR -->
  <div class="sticky top-0 z-40 flex items-center gap-3 px-6 py-3
    bg-white dark:bg-slate-900
    border-b border-slate-200 dark:border-slate-800">
    <span>🔧</span>
    <span class="font-bold text-sm">Verksted — Intern</span>
    <span class="rounded-full border border-sky-400/60 bg-sky-500/10
      px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-sky-500">Demo</span>
    <span class="ml-auto mono text-xs text-slate-400 hidden sm:inline pr-36">Onsdag 06.05.2026</span>
  </div>

  <!-- LAYOUT -->
  <div class="flex min-h-[calc(100vh-49px)]">

    <!-- SIDEBAR -->
    <div class="hidden md:flex flex-col w-64 shrink-0
      bg-white dark:bg-slate-900
      border-r border-slate-200 dark:border-slate-800
      p-4 gap-1 overflow-y-auto">

      <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 px-2 mb-1">Aktive ordrer</p>

      <div id="si-bysykkel" onclick="loadOrder('bysykkel')"
        class="flex items-start gap-2 p-3 rounded-xl cursor-pointer border transition-colors
          border-sky-500 bg-sky-500/5 hover:bg-slate-50 dark:hover:bg-slate-800">
        <span class="status-dot dot-pending"></span>
        <div>
          <div class="text-sm font-semibold">Kari Nordmann</div>
          <div class="text-xs text-slate-500">Bysykkel · Punktering</div>
          <div class="text-xs text-amber-500">⚠ Funn: Kassett</div>
        </div>
      </div>

      <div id="si-mtb" onclick="loadOrder('mtb')"
        class="flex items-start gap-2 p-3 rounded-xl cursor-pointer border transition-colors
          border-transparent hover:bg-slate-50 dark:hover:bg-slate-800">
        <span class="status-dot dot-new"></span>
        <div>
          <div class="text-sm font-semibold">Lars Hansen</div>
          <div class="text-xs text-slate-500">MTB · Bremser, gir</div>
          <div class="text-xs text-slate-400">Ingen funn ennå</div>
        </div>
      </div>

      <div id="si-elsykkel" onclick="loadOrder('elsykkel')"
        class="flex items-start gap-2 p-3 rounded-xl cursor-pointer border transition-colors
          border-transparent hover:bg-slate-50 dark:hover:bg-slate-800">
        <span class="status-dot dot-approved"></span>
        <div>
          <div class="text-sm font-semibold">Ingrid Bakke</div>
          <div class="text-xs text-slate-500">El-sykkel · Motor</div>
          <div class="text-xs text-green-500">✓ Godkjent av kunde</div>
        </div>
      </div>

      <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 px-2 mt-4 mb-1">Fullført i dag</p>

      <div id="si-done" onclick="loadOrder('done')"
        class="flex items-start gap-2 p-3 rounded-xl cursor-pointer border transition-colors
          border-transparent hover:bg-slate-50 dark:hover:bg-slate-800">
        <span class="status-dot dot-done"></span>
        <div>
          <div class="text-sm font-semibold">Ole Berg</div>
          <div class="text-xs text-slate-500">Landevei · Kjede</div>
          <div class="text-xs text-slate-400">Hentet kl. 14:30</div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 overflow-y-auto p-6 space-y-5" id="orderView"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const orders = {
  bysykkel: {
    id:'ORD-2605-01', kunde:'Kari Nordmann', telefon:'+47 900 12 345',
    sykkel:'Trek FX 3 2022 – Bysykkel', innlevert:'2026-05-06',
    rapportert:['Punktering – bakhjul'], service:['Reparasjon'], status:'pending',
    funn:[{ id:1, beskrivelse:'Kassetten er skadet og slitt. Anbefaler bytte.', komponent:'Kassett', estimat:850, status:'pending' }],
    logg:[
      { tid:'08:15', tekst:'Sykkel innlevert av kunde.' },
      { tid:'09:40', tekst:'Mekaniker startet reparasjon – punktering bakhjul.' },
      { tid:'10:05', tekst:'<strong>Funn registrert:</strong> Kassett skadet. Venter på kundegodkjenning.' }
    ]
  },
  mtb: {
    id:'ORD-2605-02', kunde:'Lars Hansen', telefon:'+47 911 22 333',
    sykkel:'Specialized Rockhopper 2021 – MTB', innlevert:'2026-05-06',
    rapportert:['Støyende bremser','Vanskelig å skifte gir'], service:['Justering','Reparasjon'], status:'new',
    funn:[], logg:[{ tid:'09:00', tekst:'Sykkel innlevert.' },{ tid:'09:50', tekst:'Mekaniker startet inspeksjon.' }]
  },
  elsykkel: {
    id:'ORD-2605-03', kunde:'Ingrid Bakke', telefon:'+47 988 77 441',
    sykkel:'Trek Allant+ 7S 2023 – El-sykkel', innlevert:'2026-05-06',
    rapportert:['Motor fungerer ikke','Display viser feilmelding'], service:['Reparasjon'], status:'approved',
    funn:[
      { id:1, beskrivelse:'Løs kontakt til motoren. Enkel reparasjon.', komponent:'Motorkobling', estimat:320, status:'approved' },
      { id:2, beskrivelse:'Firmware på display utdatert. Anbefaler oppdatering.', komponent:'Display firmware', estimat:150, status:'approved' }
    ],
    logg:[
      { tid:'08:30', tekst:'Sykkel innlevert.' },
      { tid:'09:15', tekst:'Funn registrert: motorkobling og display.' },
      { tid:'09:45', tekst:'<strong>Kunde kontaktet av resepsjon.</strong>' },
      { tid:'10:00', tekst:'<strong>Kunde godkjente alt ekstra arbeid.</strong>' }
    ]
  },
  done: {
    id:'ORD-2605-00', kunde:'Ole Berg', telefon:'+47 922 44 551',
    sykkel:'Giant Defy Advanced 2020 – Landevei', innlevert:'2026-05-06',
    rapportert:['Kjeden hopper av'], service:['Bytte av deler'], status:'done',
    funn:[],
    logg:[{ tid:'07:45', tekst:'Sykkel innlevert.' },{ tid:'08:30', tekst:'Kjede byttet. Ingen ekstra funn.' },{ tid:'14:30', tekst:'Sykkel hentet av kunde.' }]
  }
};

let currentOrderKey = 'bysykkel';
let findingCounter = 100;

function loadOrder(key) {
  currentOrderKey = key;
  ['bysykkel','mtb','elsykkel','done'].forEach(k => {
    const el = document.getElementById('si-' + k);
    if (!el) return;
    if (k === key) {
      el.classList.add('border-sky-500','bg-sky-500/5');
      el.classList.remove('border-transparent');
    } else {
      el.classList.remove('border-sky-500','bg-sky-500/5');
      el.classList.add('border-transparent');
    }
  });
  render();
}

function render() {
  const o = orders[currentOrderKey];
  const view = document.getElementById('orderView');
  const stMap = {
    new:      'rounded-full border border-sky-400/60 bg-sky-500/10 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-sky-500',
    pending:  'rounded-full border border-amber-400/60 bg-amber-500/10 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-amber-500',
    approved: 'rounded-full border border-green-400/60 bg-green-500/10 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-green-500',
    rejected: 'rounded-full border border-red-400/60 bg-red-500/10 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-red-500',
    done:     'rounded-full border border-slate-400/60 bg-slate-500/10 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-slate-400'
  };
  const stLabel = { new:'Ny ordre', pending:'Venter på kunde', approved:'Godkjent', rejected:'Avvist', done:'Fullført' };
  const totalBase = 350;
  const totalApproved = o.funn.filter(f=>f.status==='approved').reduce((s,f)=>s+f.estimat,0);
  const totalPending  = o.funn.filter(f=>f.status==='pending').reduce((s,f)=>s+f.estimat,0);
  const hasPending    = o.funn.some(f=>f.status==='pending');

  view.innerHTML = `
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <span class="mono text-xs text-slate-400">${o.id}</span>
          <span class="${stMap[o.status]}">${stLabel[o.status]}</span>
        </div>
        <h1 class="text-xl font-bold text-slate-900 dark:text-slate-100">${o.kunde}</h1>
        <p class="text-sm text-slate-500 mt-0.5">${o.sykkel}</p>
        <div class="flex flex-wrap gap-4 mt-1 text-xs text-slate-400">
          <span>📞 ${o.telefon}</span>
          <span>📅 Innlevert: ${o.innlevert}</span>
        </div>
      </div>
      ${o.status !== 'done' ? `
        <button onclick="markDone()"
          class="rounded-full border border-slate-300 dark:border-slate-700
            bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300
            px-4 py-2 text-xs font-semibold
            hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
          Merk som fullført ✓
        </button>` : ''}
    </div>

    <div class="grid lg:grid-cols-2 gap-4">
      <div class="rounded-2xl border border-slate-200 dark:border-slate-800
        bg-white dark:bg-slate-900 p-5 space-y-3">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Hva kunden rapporterte</p>
        <div class="flex flex-wrap gap-2">
          ${o.rapportert.map(p=>`
            <span class="rounded-lg border border-slate-200 dark:border-slate-700
              bg-slate-50 dark:bg-slate-800 px-3 py-1.5
              text-xs text-slate-600 dark:text-slate-300">🔍 ${p}</span>`).join('')}
        </div>
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 pt-1">Ønsket service</p>
        <div class="flex flex-wrap gap-2">
          ${o.service.map(s=>`
            <span class="rounded-lg border border-slate-200 dark:border-slate-700
              bg-slate-50 dark:bg-slate-800 px-3 py-1.5
              text-xs text-slate-600 dark:text-slate-300">⚙ ${s}</span>`).join('')}
        </div>
      </div>

      <div class="rounded-2xl border border-slate-200 dark:border-slate-800
        bg-white dark:bg-slate-900 p-5 space-y-2">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">Estimert kostnad</p>
        <div class="flex justify-between text-sm py-1 border-b border-slate-100 dark:border-slate-800">
          <span class="text-slate-500">Bestilt arbeid (basis)</span><span class="text-slate-900 dark:text-slate-100">${totalBase} kr</span>
        </div>
        ${o.funn.filter(f=>f.status==='approved').map(f=>`
          <div class="flex justify-between text-sm py-1 border-b border-slate-100 dark:border-slate-800">
            <span class="text-slate-500">+ ${f.komponent}</span>
            <span class="text-green-500">${f.estimat} kr</span>
          </div>`).join('')}
        ${totalPending > 0 ? `
          <div class="flex justify-between text-sm py-1 border-b border-slate-100 dark:border-slate-800">
            <span class="text-amber-500">⏳ Venter godkjenning</span>
            <span class="text-amber-500">+ ${totalPending} kr</span>
          </div>` : ''}
        <div class="flex justify-between text-sm font-bold pt-1 text-slate-900 dark:text-slate-100">
          <span>Totalt</span>
          <span>${totalBase + totalApproved} kr
            ${totalPending > 0 ? `<span class="text-xs font-normal text-amber-400 ml-1">+ mulig ${totalPending} kr</span>` : ''}
          </span>
        </div>
      </div>
    </div>

    <div class="rounded-2xl border border-sky-400/50 bg-white dark:bg-slate-900 p-5 space-y-3">
      <div>
        <p class="text-[10px] font-bold uppercase tracking-widest text-sky-500">⚠ Funn under reparasjon</p>
        <p class="text-xs text-slate-500 mt-1">Registrer alt som ble oppdaget. Resepsjon kontakter kunden.</p>
      </div>
      <div id="funn-list" class="space-y-2">
        ${o.funn.length === 0
          ? `<p class="text-sm text-slate-400 py-3 text-center">Ingen funn registrert ennå.</p>`
          : o.funn.map(f=>renderFunn(f)).join('')}
      </div>
      ${o.status !== 'done' ? `
        <button onclick="addFunn()"
          class="w-full rounded-xl border border-dashed
            border-slate-300 dark:border-slate-700
            py-2.5 text-sm text-slate-400 dark:text-slate-500
            hover:border-sky-400 hover:text-sky-500 transition-colors">
          + Legg til funn
        </button>` : ''}
    </div>

    ${hasPending ? `
    <div class="rounded-2xl border border-amber-400/30 bg-amber-500/5 dark:bg-amber-500/5 p-5">
      <div class="flex items-start gap-3">
        <span class="text-2xl">📞</span>
        <div class="flex-1">
          <p class="font-semibold text-sm text-amber-500 mb-1">Resepsjon: kontakt kunden</p>
          <p class="text-xs text-slate-500 mb-3">Det er funn som venter på godkjenning. Oppdater status etter kontakt.</p>
          <div class="flex flex-wrap gap-2">
            <button onclick="approveAll()"
              class="rounded-full border border-green-400/40 bg-green-500/10
                text-green-500 px-4 py-1.5 text-xs font-semibold
                hover:bg-green-500/20 transition-colors">✓ Kunde godkjente alt</button>
            <button onclick="rejectAll()"
              class="rounded-full border border-red-400/40 bg-red-500/10
                text-red-500 px-4 py-1.5 text-xs font-semibold
                hover:bg-red-500/20 transition-colors">✗ Kunde avviste alt</button>
            <button onclick="showCallLog()"
              class="rounded-full border border-slate-300 dark:border-slate-700
                bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300
                px-4 py-1.5 text-xs font-semibold
                hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">Logg notat</button>
          </div>
        </div>
      </div>
    </div>` : ''}

    <div class="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
      <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-4">Aktivitetslogg</p>
      <div class="space-y-0">
        ${o.logg.map((l,i)=>`
          <div class="flex gap-3">
            <div class="flex flex-col items-center">
              <div class="w-2 h-2 rounded-full mt-1 flex-shrink-0
                ${i===o.logg.length-1 ? 'bg-sky-500' : 'bg-slate-300 dark:bg-slate-700'}"></div>
              ${i<o.logg.length-1 ? `<div class="w-px flex-1 bg-slate-200 dark:bg-slate-800 my-1"></div>` : ''}
            </div>
            <div class="text-xs text-slate-500 pb-3">
              <strong class="text-slate-600 dark:text-slate-400">${l.tid}</strong> — ${l.tekst}
            </div>
          </div>`).join('')}
      </div>
      ${o.status !== 'done' ? `
        <div class="flex gap-2 mt-2 pt-3 border-t border-slate-100 dark:border-slate-800">
          <input type="text" id="logg-input" placeholder="Legg til notat..."
            class="flex-1 rounded-xl border border-slate-200 dark:border-slate-700
              bg-slate-50 dark:bg-slate-800
              text-slate-900 dark:text-slate-100
              px-3 py-2 text-sm
              focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-sky-400">
          <button onclick="addLogg()"
            class="rounded-xl border border-slate-200 dark:border-slate-700
              bg-white dark:bg-slate-800
              text-slate-600 dark:text-slate-300
              px-4 py-2 text-xs font-semibold
              hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">Legg til</button>
        </div>` : ''}
    </div>
  `;
}

function renderFunn(f) {
  const isDone = orders[currentOrderKey].status === 'done';
  const s = {
    pending:  { wrap:'border-amber-400/40 bg-amber-500/5',  badge:'bg-amber-500/10 text-amber-500 border-amber-400/40',  icon:'⏳', label:'Venter' },
    approved: { wrap:'border-green-400/40 bg-green-500/5',  badge:'bg-green-500/10 text-green-500 border-green-400/40',  icon:'✓',  label:'Godkjent' },
    rejected: { wrap:'border-red-400/30   bg-red-500/5',    badge:'bg-red-500/10   text-red-500   border-red-400/30',    icon:'✗',  label:'Avvist' }
  }[f.status];
  return `
    <div class="rounded-xl border ${s.wrap} p-3 flex items-start justify-between gap-3">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1 flex-wrap">
          <span class="text-xs font-semibold text-slate-700 dark:text-slate-300">${f.komponent}</span>
          <span class="rounded-full border ${s.badge} px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide">
            ${s.icon} ${s.label}
          </span>
        </div>
        <p class="text-xs text-slate-500">${f.beskrivelse}</p>
        <p class="mono text-xs text-slate-400 mt-1">${f.estimat} kr</p>
      </div>
      <div class="flex items-center gap-1 flex-shrink-0">
        ${!isDone && f.status==='pending' ? `
          <button onclick="setFunnStatus(${f.id},'approved')"
            class="rounded-full border border-green-400/40 bg-green-500/10 text-green-500
              px-3 py-1 text-xs font-bold hover:bg-green-500/20 transition-colors">✓</button>
          <button onclick="setFunnStatus(${f.id},'rejected')"
            class="rounded-full border border-red-400/40 bg-red-500/10 text-red-500
              px-3 py-1 text-xs font-bold hover:bg-red-500/20 transition-colors">✗</button>` : ''}
        ${!isDone ? `
          <button onclick="removeFunn(${f.id})"
            class="rounded-full border border-slate-200 dark:border-slate-700
              bg-white dark:bg-slate-800 text-slate-400
              px-2.5 py-1 text-xs hover:text-red-400 transition-colors">✕</button>` : ''}
      </div>
    </div>`;
}

function addFunn() {
  if (document.getElementById('new-funn-form')) return;
  const list = document.getElementById('funn-list');
  const form = document.createElement('div');
  form.id = 'new-funn-form';
  form.className = 'rounded-xl border border-sky-400/50 bg-sky-500/5 p-3 space-y-2';
  form.innerHTML = `
    <p class="text-[10px] font-bold uppercase tracking-widest text-sky-500">Nytt funn</p>
    <input type="text" id="nf-komponent" placeholder="Komponent (f.eks. Kassett, Kjede...)"
      class="w-full rounded-xl border border-slate-200 dark:border-slate-700
        bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100
        px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
    <textarea id="nf-beskrivelse" rows="2" placeholder="Beskriv funnet..."
      class="w-full rounded-xl border border-slate-200 dark:border-slate-700
        bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100
        px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400 resize-none"></textarea>
    <div class="flex gap-2 items-center flex-wrap">
      <input type="number" id="nf-estimat" placeholder="Estimat (kr)"
        class="w-32 rounded-xl border border-slate-200 dark:border-slate-700
          bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100
          px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
      <button onclick="saveFunn()"
        class="rounded-full bg-sky-500 text-white px-4 py-1.5 text-xs font-semibold
          hover:bg-sky-600 transition-colors">Lagre funn</button>
      <button onclick="cancelFunn()"
        class="rounded-full border border-slate-200 dark:border-slate-700
          bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400
          px-4 py-1.5 text-xs font-semibold
          hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">Avbryt</button>
    </div>`;
  list.appendChild(form);
  document.getElementById('nf-komponent').focus();
}

function saveFunn() {
  const o = orders[currentOrderKey];
  const komp = document.getElementById('nf-komponent').value.trim();
  const besk = document.getElementById('nf-beskrivelse').value.trim();
  const est  = parseInt(document.getElementById('nf-estimat').value) || 0;
  if (!komp || !besk) { showToast('Fyll inn komponent og beskrivelse.', 'warn'); return; }
  findingCounter++;
  o.funn.push({ id:findingCounter, beskrivelse:besk, komponent:komp, estimat:est, status:'pending' });
  o.logg.push({ tid:nowTid(), tekst:`<strong>Nytt funn registrert:</strong> ${komp}. Venter på kundegodkjenning.` });
  if (o.status === 'new') o.status = 'pending';
  showToast('Funn registrert ✓', 'success');
  render();
}

function cancelFunn() { const f = document.getElementById('new-funn-form'); if (f) f.remove(); }
function removeFunn(id) { orders[currentOrderKey].funn = orders[currentOrderKey].funn.filter(f=>f.id!==id); render(); }

function setFunnStatus(id, status) {
  const o = orders[currentOrderKey];
  const funn = o.funn.find(f=>f.id===id);
  if (!funn) return;
  funn.status = status;
  o.logg.push({ tid:nowTid(), tekst:`Kunde ${status==='approved'?'godkjente':'avviste'} ekstra arbeid: <strong>${funn.komponent}</strong>.` });
  if (o.funn.every(f=>f.status!=='pending'))
    o.status = o.funn.some(f=>f.status==='approved') ? 'approved' : 'rejected';
  showToast(status==='approved' ? 'Godkjent ✓' : 'Avvist', status==='approved' ? 'success' : '');
  render();
}

function approveAll() {
  const o = orders[currentOrderKey];
  o.funn.forEach(f=>{ if(f.status==='pending') f.status='approved'; });
  o.logg.push({ tid:nowTid(), tekst:'<strong>Resepsjon:</strong> Kunde godkjente alt ekstra arbeid.' });
  o.status = 'approved';
  showToast('Alt godkjent av kunde ✓', 'success');
  render();
}

function rejectAll() {
  const o = orders[currentOrderKey];
  o.funn.forEach(f=>{ if(f.status==='pending') f.status='rejected'; });
  o.logg.push({ tid:nowTid(), tekst:'<strong>Resepsjon:</strong> Kunde avviste alt ekstra arbeid.' });
  o.status = 'rejected';
  showToast('Avvist av kunde', '');
  render();
}

function showCallLog() {
  const msg = prompt('Logg notat fra kontakt med kunde:');
  if (!msg) return;
  orders[currentOrderKey].logg.push({ tid:nowTid(), tekst:`📞 <strong>Resepsjon:</strong> ${msg}` });
  showToast('Notat lagt til', 'success');
  render();
}

function addLogg() {
  const input = document.getElementById('logg-input');
  if (!input || !input.value.trim()) return;
  orders[currentOrderKey].logg.push({ tid:nowTid(), tekst:input.value.trim() });
  showToast('Notat lagt til', 'success');
  render();
}

function markDone() {
  const o = orders[currentOrderKey];
  o.logg.push({ tid:nowTid(), tekst:'Sykkel merket som fullført og klar for henting.' });
  o.status = 'done';
  showToast('Merket som fullført ✓', 'success');
  render();
}

function nowTid() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show toast-${type||'default'}`;
  setTimeout(()=>{ t.classList.remove('show'); }, 2500);
}

render();
</script>
</body>
</html>
